name: Daily Refresh

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests geopy

      - name: Fetch all listings
        id: fetch_main
        env:
          GOOGLE_GEOCODE_KEY: ${{ secrets.GOOGLE_GEOCODE_KEY }}
        run: |
          mkdir -p data
          python scripts/fetch_listings.py

      - name: Fetch extra (WP/HTML scrapers)
        id: fetch_extra
        run: python scripts/fetch_extra.py

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r css deploy/
          cp -r js deploy/
          cp -r data deploy/
          cp README.md deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `⚠️ **Daily Refresh failed**\n\nPennyBridge pipeline failed on ${new Date().toISOString().split('T')[0]}.\n\nCheck logs: ${runUrl}\n\nLive site may be serving stale data from the last successful run.`;

            // Check if an issue already exists for today
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['pipeline-failure'],
            });

            const todayLabel = new Date().toISOString().split('T')[0];
            const existing = issues.find(i => i.title.includes(todayLabel));

            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Pipeline failed — ${todayLabel}`,
                body,
                labels: ['pipeline-failure'],
              });
            }

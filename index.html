<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PennyBridge — Rental listings in Orebro</title>
    <meta name="description" content="Map of available rental apartments from multiple landlords in Orebro.">
    <meta property="og:title" content="PennyBridge — Rentals in Orebro">
    <meta property="og:description" content="Find available rental apartments across Orebro landlords — all in one map.">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌉</text></svg>">
    <script data-goatcounter="https://halse.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <style>.editor-link { position:fixed; bottom:90px; right:28px; z-index:2000; background:rgba(0,0,0,0.5); color:#fff; padding:6px 10px; border-radius:4px; font-size:0.7rem; text-decoration:none; }</style>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <header class="sidebar-header">
                <div class="header-top">
                    <h1 id="mapTitle">🌉 PennyBridge</h1>
                    <button id="langToggle" class="lang-toggle" aria-label="Switch language">SV</button>
                </div>
            </header>

            <nav id="categoryTabs" class="category-tabs"></nav>

            <div id="filters"></div>
            <div id="stats"></div>
            <div id="resultsList"></div>
        </aside>

        <main id="map"></main>

        <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

        <a href="editor.html" class="editor-link" title="Location Editor">📍</a>

        <button id="filterToggle" aria-label="Filters" title="Filters">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
        </button>

        <a id="coffeeButton" href="https://buymeacoffee.com/fn6yy17gcr" target="_blank" rel="noopener" title="Buy me a coffee" aria-label="Buy me a coffee">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
            </svg>
        </a>

        <div id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Loading data...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
